name: Sync docs to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i googleapis

      - name: Sync README + Worker to Drive
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          README_PATH: README.md
          WORKER_PATH: workers/api/src/index.js
          README_DRIVE_NAME: README.md
          WORKER_DRIVE_NAME: workers-api-index.js
        run: node scripts/sync-drive-docs.mjs
