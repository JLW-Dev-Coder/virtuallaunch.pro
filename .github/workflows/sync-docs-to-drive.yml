name: Slack Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_sync:
        default: "false"
        description: "Post every file in the repo (true/false)"
        required: true

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Post repo sync to Slack
        env:
          FULL_SYNC: ${{ inputs.full_sync || 'false' }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: node scripts/sync-drive-docs.mjs
