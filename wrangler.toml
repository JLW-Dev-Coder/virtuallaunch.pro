name = "virtuallaunch-pro-api"
main = "workers/src/index.js"
compatibility_date = "2026-02-28"

# ---------------------------------------
# Routes
# ---------------------------------------

routes = [
  { pattern = "api.virtuallaunch.pro/*", zone_name = "virtuallaunch.pro" }
]

# ---------------------------------------
# Observability
# ---------------------------------------

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ---------------------------------------
# Bindings
# ---------------------------------------

[[r2_buckets]]
binding = "R2_VIRTUAL_LAUNCH"
bucket_name = "virtuallaunch-pro"

[[d1_databases]]
binding = "DB"
database_name = "virtuallaunch-pro"
database_id = "079dfd69-dbf4-4070-bc91-51f837021795"
migrations_dir = "workers/migrations"

# ---------------------------------------
# Vars (non-secret)
# ---------------------------------------

[vars]

# =================================================
# App
# =================================================

APP_BASE_URL = "https://api.virtuallaunch.pro"
COOKIE_DOMAIN = ".virtuallaunch.pro"
ENVIRONMENT = "production"
MAGIC_LINK_EXPIRATION_MINUTES = "15"
SESSION_TTL_SECONDS = "86400"

# =================================================
# Auth
# =================================================

GOOGLE_CLIENT_ID = "567315945471-t231g2f08bnti82h5omhg90dflc9ljtj.apps.googleusercontent.com"
